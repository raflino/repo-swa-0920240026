<script>
    // Ganti dengan URL dari Get Function URL di Portal Azure
    const API_URL = "https://func-serverless-0920240026-cjdrayh7aee0h2cy.indonesiacentral-01.azurewebsites.net/api/HttpPraktikum";

    async function hitungBiaya() {
        const jumlah = document.getElementById('jumlah').value;
        const jenis = document.getElementById('jenis').value;
        const resultDiv = document.getElementById('result');
        
        if (!jumlah || jumlah <= 0) {
            resultDiv.innerHTML = "❌ Masukkan jumlah peserta yang valid!";
            return;
        }
        
        resultDiv.innerHTML = "⏳ Menghitung...";
        
        try {
            // Cek apakah API_URL sudah mengandung '?'
            const connector = API_URL.includes('?') ? '&' : '?';
            const url = `${API_URL}${connector}jumlah=${jumlah}&jenis=${jenis}`;
            
            console.log("Calling API:", url);
            
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            console.log("Response:", data);
            
            if (data.error) {
                resultDiv.innerHTML = `❌ Error: ${data.error}`;
                return;
            }
            
            resultDiv.innerHTML = `
                <p><strong>📊 Jumlah:</strong> ${data.jumlah}</p>
                <p><strong>🍽️ Jenis:</strong> ${data.jenis}</p>
                <p><strong>💰 Harga per peserta:</strong> Rp${data.hargaPerPeserta.toLocaleString()}</p>
                <p><strong>💵 Total:</strong> Rp${data.total.toLocaleString()}</p>
                <p><strong>🕐 Timestamp:</strong> ${new Date(data.timestamp).toLocaleString()}</p>
            `;
        } catch (error) {
            console.error("Error:", error);
            resultDiv.innerHTML = `❌ Error: ${error.message}`;
        }
    }
</script>
