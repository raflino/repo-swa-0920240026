<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Estimasi Biaya Konsumsi</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f4f6f8; }
        .container { background: white; padding: 24px; border-radius: 12px; max-width: 400px; margin: auto; }
        h1 { color: #1f4e79; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 20px; background: #1f4e79; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #eef; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Estimasi Biaya Konsumsi</h1>
    <label>Jumlah Peserta:</label>
    <input type="number" id="jumlah" placeholder="Contoh: 40">
    
    <label>Jenis Konsumsi:</label>
    <select id="jenis">
        <option value="snack">Snack (Rp15.000)</option>
        <option value="makan">Makan (Rp30.000)</option>
        <option value="lengkap">Lengkap (Rp45.000)</option>
    </select>
    
    <button onclick="hitungBiaya()">Hitung</button>
    <div id="result" class="result"></div>
</div>

<script>
    // 🔴 🔴 🔴 GANTI URL INI DENGAN HASIL DARI LANGKAH 1 (TOM 'Get Function URL') 🔴 🔴 🔴
    const API_URL = "https://func-serverless-0920240026-cjdrayh7aee0h2cy.indonesiacentral-01.azurewebsites.net/api/HttpPraktikum";

    async function hitungBiaya() {
        const jumlah = document.getElementById('jumlah').value;
        const jenis = document.getElementById('jenis').value;
        const resultDiv = document.getElementById('result');
        
        if (!jumlah || jumlah <= 0) {
            resultDiv.innerHTML = "Masukkan jumlah peserta yang valid!";
            return;
        }
        
        resultDiv.innerHTML = "Menghitung...";
        
        try {
            // Kode penting: Menambahkan parameter jumlah & jenis ke URL API
            const url = `${API_URL}&jumlah=${jumlah}&jenis=${jenis}`;
            console.log("Calling API:", url); // Cek di console browser
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.error) {
                resultDiv.innerHTML = `Error: ${data.error}`;
                return;
            }
            
            resultDiv.innerHTML = `
                <p><strong>Jumlah:</strong> ${data.jumlah}</p>
                <p><strong>Jenis:</strong> ${data.jenis}</p>
                <p><strong>Harga per peserta:</strong> Rp${data.hargaPerPeserta.toLocaleString()}</p>
                <p><strong>Total:</strong> Rp${data.total.toLocaleString()}</p>
                <p><strong>Timestamp:</strong> ${new Date(data.timestamp).toLocaleString()}</p>
            `;
        } catch (error) {
            console.error("Error detail:", error);
            resultDiv.innerHTML = `Error menghubungi API: ${error.message}`;
        }
    }
</script>
</body>
</html>
